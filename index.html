<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kahoot!!</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.4/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --red: #e21b3c; --blue: #1368ce; --yellow: #d89e00; --green: #26890c; --purple: #46178f; --dark: #1a1a1a; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f2f2f2; color: var(--dark); overflow-x: hidden; }
        .screen { display: none; min-height: 100vh; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; }
        .screen.active { display: flex; }
        .btn-main { background-color: var(--purple); color: white; border: none; padding: 12px 35px; font-size: 20px; font-weight: bold; border-radius: 8px; cursor: pointer; transition: 0.2s; margin-top: 15px; }
        .btn-main:hover { transform: scale(1.03); background-color: #361071; }
        .quiz-set-container { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 700px; text-align: left; margin-bottom: 25px; max-height: 65vh; overflow-y: auto; position: relative; }
        .q-editor-block { border-left: 4px solid var(--purple); padding-left: 15px; margin: 20px 0; background: #fafafa; padding: 15px; border-radius: 0 8px 8px 0; }
        .quiz-set-container input, .quiz-set-container select { width: 100%; padding: 10px; margin: 6px 0 12px 0; border: 1px solid #ccc; border-radius: 6px; }
        .opt-row { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .persistent-lobby-info { position: absolute; top: 15px; right: 15px; background: rgba(255, 255, 255, 0.95); padding: 12px; border-radius: 12px; border: 2px solid var(--purple); display: none; flex-direction: column; z-index: 999; width: 220px; }
        .persistent-lobby-info.visible { display: flex; }
        .option-card { padding: 25px; font-size: 24px; font-weight: bold; color: white; border-radius: 8px; display: flex; align-items: center; gap: 15px; margin: 10px; cursor: pointer; }
        .opt-0 { background-color: var(--red); } .opt-1 { background-color: var(--blue); }
        .opt-2 { background-color: var(--yellow); } .opt-3 { background-color: var(--green); }
        .pad-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; width: 100%; }
        .pad-btn { padding: 40px; font-size: 20px; color: white; border: none; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="global-persistent-panel" class="persistent-lobby-info">
        <div style="font-weight:bold; color:var(--purple);">房間 ID: <span id="persist-pin-text">----</span></div>
        <div id="persist-qrcode"></div>
    </div>

    <div id="screen-welcome" class="screen active" style="background: linear-gradient(135deg, #46178f 0%, #250854 100%); color: white;">
        <h1>Kahoot!! FAKE</h1>
        <div id="quiz-workspace" style="width: 100%; display: flex; flex-direction: column; align-items: center;"></div>
        <input type="file" id="file-import-input" accept=".txt" style="display: none;" onchange="handleFileImport(event)">
        <div id="welcome-action-buttons">
            <button class="btn-main" style="background:#00c853;" onclick="createNewQuizSetUI()">＋ 新增題組</button>
            <button class="btn-main" style="background:#00e5ff; color:#1a1a1a;" onclick="document.getElementById('file-import-input').click()">📂 匯入題組 (.txt)</button>
            <button id="btn-host-start" class="btn-main" style="display:none;" onclick="initHost()">開啟大螢幕 (Host)</button>
        </div>
        <button class="btn-main" style="background:#0085ff; margin-top:20px;" onclick="switchScreen('screen-pad-login')">手動加入遊戲</button>
    </div>

    <div id="screen-host-lobby" class="screen">
        <h2>📢 玩家加入中...</h2>
        <div id="qrcode"></div>
        <div style="font-size: 40px; font-weight: bold; margin: 20px;">PIN: <span id="room-pin-text">---</span></div>
        <button id="btn-start-game" class="btn-main" style="display:none;" onclick="startQuiz()">開始遊戲</button>
    </div>

    <div id="screen-host-quiz" class="screen">
        <div id="host-quiz-progress" style="font-size:24px; font-weight:bold;">題目 1/1</div>
        <div id="host-question" style="font-size:32px; margin:20px;">載入中...</div>
        <div id="host-options" style="display:grid; grid-template-columns: 1fr 1fr; width:100%;"></div>
    </div>

    <div id="screen-pad-login" class="screen">
        <input type="text" id="pad-pin-input" placeholder="房間 PIN" style="padding:10px; width:80%; margin:10px;">
        <input type="text" id="pad-name-input" placeholder="暱稱" style="padding:10px; width:80%; margin:10px;">
        <button class="btn-main" onclick="connectToHost()">進入遊戲</button>
    </div>

    <div id="screen-pad-game" class="screen">
        <div class="pad-grid">
            <button class="pad-btn opt-0" onclick="submitAns(0)">圓形</button>
            <button class="pad-btn opt-1" onclick="submitAns(1)">菱形</button>
            <button class="pad-btn opt-2" onclick="submitAns(2)">正方形</button>
            <button class="pad-btn opt-3" onclick="submitAns(3)">三角形</button>
        </div>
    </div>

    <script>
        let quizData = [];
        let peer = null;
        let myConn = null;
        let connMap = new Map();
        let role = '';
        let currentIdx = 0;

        /* 修正版：健壯的檔案匯入功能 */
        function handleFileImport(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const lines = e.target.result.split(/\r?\n/).map(l => l.trim()).filter(l => l !== "");
                    let importedQuestions = [];
                    let currentQ = null;
                    
                    lines.forEach(line => {
                        if (line.includes('# 題目')) {
                            currentQ = { q: '', opts: [], ans: 0 };
                            importedQuestions.push(currentQ);
                        } else if (currentQ) {
                            if (/^A\)/i.test(line)) currentQ.opts[0] = line.substring(2).trim();
                            else if (/^B\)/i.test(line)) currentQ.opts[1] = line.substring(2).trim();
                            else if (/^C\)/i.test(line)) currentQ.opts[2] = line.substring(2).trim();
                            else if (/^D\)/i.test(line)) currentQ.opts[3] = line.substring(2).trim();
                            else if (line.includes('正確答案:')) {
                                const ans = line.split('正確答案:')[1].trim().toUpperCase();
                                currentQ.ans = ans.includes('A')?0:ans.includes('B')?1:ans.includes('C')?2:3;
                            } else if (!currentQ.q) {
                                currentQ.q = line;
                            }
                        }
                    });
                    
                    if (importedQuestions.length === 0) throw new Error('格式錯誤');
                    quizData = importedQuestions;
                    createNewQuizSetUI();
                    alert(`匯入成功：共 ${quizData.length} 題`);
                } catch(err) { alert('匯入失敗，請檢查檔案格式。'); }
            };
            reader.readAsText(file);
        }

        /* 修正版：強化版 PeerJS 連線邏輯 */
        function connectToHost() {
            const pin = document.getElementById('pad-pin-input').value.trim();
            const name = document.getElementById('pad-name-input').value.trim();
            if(!pin || !name) return alert('請填寫完整');

            // 使用無固定 ID 建立 Peer，避免命名衝突
            peer = new Peer(null, { debug: 2 }); 

            peer.on('open', () => {
                myConn = peer.connect('kahoot-room-' + pin, { reliable: true });
                myConn.on('open', () => {
                    myConn.send({ type: 'JOIN', name: name });
                    switchScreen('screen-pad-game');
                });
                myConn.on('data', (data) => {
                    if(data.type === 'START_QUESTION') {
                        document.getElementById('host-question').innerText = data.qTitle;
                    }
                });
            });
            peer.on('error', (err) => alert('連線失敗，請確認 WiFi 與 Server 狀態: ' + err.type));
        }

        function initHost() {
            const roomPin = Math.floor(1000 + Math.random() * 9000).toString();
            document.getElementById('room-pin-text').innerText = roomPin;
            peer = new Peer('kahoot-room-' + roomPin, { debug: 2 });
            peer.on('connection', (conn) => {
                connMap.set(conn.peer, conn);
                document.getElementById('btn-start-game').style.display = 'block';
            });
            switchScreen('screen-host-lobby');
        }

        /* 工具函數 */
        function switchScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function createNewQuizSetUI() {
            document.getElementById('quiz-workspace').innerHTML = `<div class="quiz-set-container">載入 ${quizData.length} 題組</div>`;
            document.getElementById('btn-host-start').style.display = 'block';
        }

        function startQuiz() {
            switchScreen('screen-host-quiz');
            connMap.forEach(c => c.send({ type: 'START_QUESTION', qTitle: quizData[0].q }));
        }

        function submitAns(idx) {
            if(myConn) myConn.send({ type: 'SUBMIT_ANSWER', optIdx: idx });
            alert('已送出！');
        }
    </script>
</body>
</html>
